python:
  - 3.12

packages:
  - numpy

# Pin the *build-time* openssl to the oldest still-published 3.x minor
# (patch floats to the latest 3.0.z automatically). openssl's run_exports
# bakes in ">=<build version>,<4.0a0" -- building against whatever's
# newest (3.6.3, then briefly 4.0.1) made that floor the newest thing on
# the channel, which is higher than what many prebuilt conda-forge
# binaries (e.g. git, linked against 3.0.0) tolerate at runtime
# ("OpenSSL version mismatch" -- their compile-time check trips on a
# major.minor drift, not just patch). Pinning to 3.0 keeps the floor at
# the oldest ABI-compatible line instead of dragging every consuming
# environment up to the newest release; the <4.0a0 ceiling still lets
# environments upgrade freely within 3.x.
openssl:
  - 3.0

c_stdlib:
  - sysroot                  # [linux]
c_stdlib_version:
  - 2.17    # [linux]

c_compiler:            # [linux]
  - gcc
cxx_compiler:          # [linux]
  - gxx
c_compiler_version:    # [linux]
  - 14
cxx_compiler_version:  # [linux]
  - 14
libgcc_version:        # [linux]
  - 14.*
libstdcxx_version:     # [linux]
  - 14.*

