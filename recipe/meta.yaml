package:
  name: {{ environ.get('ANACONDA_PACKAGE')|string|lower }}
  version: {{ environ.get('ANACONDA_VERSION')|string|replace('-', '.') }}

{% set version = environ.get('COMMIT_TAG', None) or environ.get('COMMIT_LATEST_TAG', None) or None %}
{% set sha256 = {
    "2024.09.16.0-free": "db111e67d895507e245cdb285086cd5f5529b4f5a1b5794a7ef5753bbb582201",
    "2024.09.16": "db111e67d895507e245cdb285086cd5f5529b4f5a1b5794a7ef5753bbb582201",
    "2024.06.12.0-free": "4841604233c192646868c0ffef25e25cef4364dad186a674d64a6d48342eafce", 
    "2024.06.12": "c2a09876785dc010a7fdb482f48f94f76483626f2fdbeb49ecde9bd49e820f01"
} %}

{% set version = version or sha256.keys()|first %}
source:
  url: "https://cernlib.web.cern.ch/download/{{ version.split('.')[0] }}_source/tar/cernlib-cernlib-{{ version }}.tar.gz"
#  patches:
#    - isystem_patch.diff

  {% if sha256.get(version, None) %}
  sha256: {{ sha256.get(version) }}
  {% endif %}

requirements:
  build:
    - {{ compiler('gfortran') }}   # GNU Fortran compiler
    - {{ compiler('c') }}          # GNU C compiler
    - {{ compiler('cxx') }}        # GNU C++ compiler
    
    - cmake                        # Build system
    - make                         # Make utility
    - xorg-imake                   # X.Org imake utility

  host:
    - python
    - xorg-libx11                  # X11 client-side library
    - xorg-libxaw                  # Xaw widget set for X11
    - freetype                     # FreeType library for font rendering
    - openmotif-dev                # Open Motif development libraries
    - zlib                         # Compression library (if needed)
    - libnsl

  run:
    - python

about:
  home: "https://cernlib.web.cern.ch"
  license: "GPL-3.0"
  summary: "CERN library for high-energy physics calculations."
  description: |
    CERNLIB is a collection of general-purpose libraries and modules maintained and developed by CERN for physics data analysis and related purposes.

extra:
  recipe-maintainers:
    - meiyasan

