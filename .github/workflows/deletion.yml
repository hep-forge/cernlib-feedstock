name: Detect Branch and Tag Deletion

on:
  delete:
    branches:
      - '**'
    tags:
      - '*'

jobs:
  detect_deletion:
    runs-on: ubuntu-latest
    steps:
      - name: Check if a branch or tag was deleted
        env:
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
          REF_TAG: ${{ github.event.ref }}
        run: |

          echo $REF_TYPE
          echo $REF_NAME
          echo $REF_TAG
