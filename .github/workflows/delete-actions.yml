name: Delete Files from Anaconda on Tag or Branch Deletion

on:
  delete:
    branches:
      - '*'         # Runs on branch deletion
    tags:
      - '*'         # Runs on tag deletion

jobs:
  delete-from-anaconda:
    runs-on: ubuntu-latest

    steps:
      - name: Check if Tag or Branch was Deleted
        id: check_delete
        run: echo "::set-output name=ref_type::${GITHUB_REF_TYPE}"

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.x'

      - name: Install Anaconda CLI
        run: |
          pip install anaconda-client

      - name: Authenticate with Anaconda
        env:
          ANACONDA_API_TOKEN: ${{ secrets.ANACONDA_TOKEN }}
        run: |
          # Check if authentication works
          anaconda whoami

      - name: Delete files in Anaconda based on Deleted Tag or Branch
        if: steps.check_delete.outputs.ref_type == 'tag' || steps.check_delete.outputs.ref_type == 'branch'
        env:
          ANACONDA_API_TOKEN: ${{ secrets.ANACONDA_TOKEN }}
        run: |
          # Define package name and organization
          ORG_NAME="your_org_name"
          PACKAGE_NAME="your_package_name"

          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            TAG_NAME="${GITHUB_REF#refs/tags/}"
            # Perform deletion for a tag
            echo "Deleting files in Anaconda associated with tag: $TAG_NAME"
            anaconda remove "$ORG_NAME/$PACKAGE_NAME/$TAG_NAME" --force

          elif [ "${GITHUB_REF_TYPE}" = "branch" ]; then
            BRANCH_NAME="${GITHUB_REF#refs/heads/}"
            # Perform deletion for a branch
            echo "Deleting files in Anaconda associated with branch: $BRANCH_NAME"
            anaconda remove "$ORG_NAME/$PACKAGE_NAME/$BRANCH_NAME" --force
          fi
